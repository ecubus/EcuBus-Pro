name: Build-Windows

on:
  push:
    branches: [master,canmartix]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # Build job
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Embedding Python
        uses: ./.github/actions/setup-python-build
      - name: Build App
        uses: ./.github/actions/build-app
        with:
          platform: win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAIN_VITE_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          MAIN_VITE_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: ecubus-portable
          path: dist/win-unpacked
      - uses: actions/upload-artifact@v4
        with:
          name: ecubus-installer
          path: dist/*.exe
